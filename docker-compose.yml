version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-guard-postgres
    environment:
      POSTGRES_USER: campus_guard
      POSTGRES_PASSWORD: campus_guard_secret
      POSTGRES_DB: campus_guard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_guard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campus-guard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后续阶段启用
